<div class="container my-5 pb-5">
  <h2 class="text-white mb-4 border-bottom pb-2">LISTA DE PELÍCULAS RECOMENDADAS</h2>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    
    <div class="col" *ngFor="let pelicula of listaPeliculas">
      <div class="card bg-dark text-white border-secondary shadow">
        <img [src]="pelicula.image" class="card-img-top" [alt]="pelicula.title" style="width: 100%; height: auto;">
        <div class="card-body d-flex flex-column">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="card-title text-warning fw-bold mb-0 text-uppercase small">{{ pelicula.title }}</h5>
            <span class="badge bg-warning text-dark fw-bold">⭐ {{ pelicula.rating }}</span>
          </div>

          <p class="text-secondary small mb-1">Año: {{ pelicula.year }}</p>
          
          <p class="card-text  flex-grow-1 small" style="text-align: justify;">
            <strong>Desc:</strong> {{ pelicula.description }}
          </p>
          
          <div class="mt-3">
            <small class="text-secondary d-block mb-1">Gér:</small>
            <span *ngFor="let g of pelicula.genre" class="badge bg-info text-dark me-1 mb-1 rounded-pill fw-semibold">
              {{ g }}
            </span>
          </div>

          <div class="mt-3 pt-2 border-top border-secondary text-end">
            <a [href]="pelicula.imdb_link" target="_blank" class="btn btn-outline-light btn-sm">
              Ver en IMDb ↗
            </a>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>
